<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two-Way Sign Communication</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <h2>Welcome</h2>
      <p>Two-Way Sign Language Communication</p>
      <input type="text" id="userName" placeholder="Enter your name">
      <button onclick="enterApp()">Enter App</button>
    </div>
  </div>

  <div id="mainApp" style="display:none;">
  <h1>Two-Way Sign Language Communication</h1>

  <div class="container">
    <video id="video"></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>

  <h2 id="result">Gesture: Waiting...</h2>

  <button onclick="startListening()">🎤 Start Voice</button>
  <p id="speechText">Mee voice text ikkada kanipistundi...</p>
  <div id="signOutput" style="margin-top:20px; font-size:80px;">🤟</div>

  <script src="script.js"></script>
  </div>
</body>
</html>
